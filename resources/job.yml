resources:
  pipelines:
    churn_pipeline:
      name: banco_futura_churn_pipeline
      catalog: churn_banco_futura
      schema: medallion
      serverless: true
      libraries:
        - file:
            path: ../pipeline/pipeline_01_bronze.py
        - file:
            path: ../pipeline/pipeline_02_silver.py
        - file:
            path: ../pipeline/pipeline_03_gold.py

  jobs:
    churn_job:
      name: banco_futura_churn_job
      tasks:
        - task_key: run_medallion_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.churn_pipeline.id}

        - task_key: train_xgboost
          depends_on:
            - task_key: run_medallion_pipeline
          notebook_task:
            notebook_path: ../models/model_A_xgboost.py
            base_parameters:
              catalog: churn_banco_futura
              schema: medallion

        - task_key: train_mllib_native
          depends_on:
            - task_key: run_medallion_pipeline
          notebook_task:
            notebook_path: ../models/model_B_spark_mllib_nativo.py
            base_parameters:
              catalog: churn_banco_futura
              schema: medallion
